description: >-
  Umbrel packaging for LangChain's archived Executive AI Assistant project.


  This package adds a local Umbrel control page, persistent config and secret storage,
  and an optional polling loop that runs Gmail ingestion on a schedule.


  Requirements:
  - Google OAuth desktop client JSON
  - LANGSMITH_API_KEY
  - OPENAI_API_KEY and/or ANTHROPIC_API_KEY


  Default mode uses Agent Inbox for human approval, which matches upstream behavior most closely.
  You can also switch to EAIA_APPROVAL_MODE=auto_accept for a more automatic setup.
