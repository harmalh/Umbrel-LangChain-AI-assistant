name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      eaia_ref:
        description: "Upstream executive-ai-assistant ref"
        required: false
        default: "main"
      image_repository:
        description: "GHCR image repository"
        required: false
        default: "ghcr.io/harmalh/umbrel-langchain-ai-assistant"
      image_tag:
        description: "Image tag"
        required: false
        default: "0.1.0"
      push_image:
        description: "Push image to GHCR"
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_image }}
          tags: ${{ inputs.image_repository }}:${{ inputs.image_tag }}
          build-args: |
            EAIA_REF=${{ inputs.eaia_ref }}
